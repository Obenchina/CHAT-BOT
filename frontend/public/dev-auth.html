<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dev Auth Helper</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: #06111f;
        color: #eaf3ff;
      }

      .card {
        width: min(92vw, 460px);
        padding: 24px;
        border-radius: 18px;
        background: rgba(9, 25, 47, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.18);
        box-shadow: 0 18px 40px rgba(2, 8, 18, 0.35);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.1rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #b8cce6;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Dev Auth Helper</h1>
      <p id="message">Preparing authenticated session...</p>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");
      const redirect = params.get("redirect") || "/";
      const message = document.getElementById("message");

      if (!token) {
        message.textContent = "Missing token query parameter.";
      } else {
        localStorage.setItem("token", token);
        message.textContent = "Session stored. Redirecting...";
        window.location.replace(redirect);
      }
    </script>
  </body>
</html>
